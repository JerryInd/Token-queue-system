);

let value="";

/* Build numpad */
for(let i=1;i<=9;i++){
  document.getElementById("pad").innerHTML += 
    `<button onclick="add(${i})">${i}</button>`;
  if(i%3==0) document.getElementById("pad").innerHTML += "<br>";
}
document.getElementById("pad").innerHTML += 
  `<button onclick="add(0)">0</button>`;

function updateDisplay(val){
  document.getElementById("token").innerText = val;
}

async function fetchToken(){
  const { data } = await client.from('token')
    .select()
    .eq('id',1)
    .single();
  if(data) updateDisplay(data.value);
}
fetchToken();

function add(n){
  value+=n;
  setToken(parseInt(value));
}

async function setToken(v){
  await client.from('token')
    .update({value:v})
    .eq('id',1);
  value=v.toString();
}

async function plus(){
  const { data } = await client.from('token')
    .select()
    .eq('id',1)
    .single();
  if(data) setToken(data.value+1);
}

async function minus(){
  const { data } = await client.from('token')
    .select()
    .eq('id',1)
    .single();
  if(data && data.value>0) setToken(data.value-1);
}

async function reset(){
  value="";
  setToken(0);
}

client.channel('realtime')
  .on('postgres_changes',
    {event:'UPDATE',schema:'public',table:'token'},
    payload=>{
      updateDisplay(payload.new.value);
    }
  )
  .subscribe();
</script>
